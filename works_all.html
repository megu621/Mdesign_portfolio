    <nav class="pc_nav">

        <li>

        </li>
        <li>
          <a href="#" target="_blank" rel="noopener noreferrer">

      </ul>
    </nav>

    <div class="sp_btn">
      <span></span>
    </div>

    <nav class="sp_nav">
      <ul>
        <li><a href="#home"></a>Home</li>
        <li><a href="#about"></a>About</li>
        <li><a href="#works"></a>Works</li>
        <li><a href="#contact"></a>Contact</li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="works">
      <div class="page_title">
        <h2><span class="color_change">W</span>orks</h2>
        <h3 class="sub_title">制作したもの</h3>
        <img src="./images/section_logo_flower.svg" alt="ガーベラ">
      </div>
      <div class="works_btn_box">
        <a href="#" class="works_btn">ALL</a>
        <a href="#" class="works_btn">WEB SITE</a>
        <a href="#" class="works_btn">BANNER</a>
      </div>
      <div class="works_img_area">
        <div class="style">
          <img src="./images/website_top_1x.jpg" class="pc" alt="workers">
          <img src="./images/website_top_2x.jpg" class="sp" alt="workers">
          <h5>WORKERS</h5>
        </div>
        <div class="style">
          <img src="./images/website2_1_1x.jpg" class="pc" alt="hair-design">
          <img src="./images/website2_3_2x.jpg" class="sp" alt="hair-design">
          <h5>hair-design</h5>
        </div>
        <div class="style">
          <img src="./images/banner1_1phon_1x.jpg" class="pc" alt="phon">
          <img src="./images/banner1_3phon2x.jpg" class="sp" alt="phon">
          <h5 class="font">スマホ学割</h5>
        </div>
        <div class="style">
          <img src="./images/banner2_1ice_1x.jpg" class="pc" alt="ice">
          <img src="./images/banner2_3ice_2x.jpg" class="sp" alt="ice">
          <h5>ICE CREAM</h5>
        </div>
        <div class="style">
          <img src="./images/banner3_1burger_1x.jpg" class="pc" alt="humberger1">
          <img src="./images/banner3_3burger_2x.jpg" class="sp" alt="humberger1">
          <h5 class="font">激旨バーガー</h5>
        </div>
        <div class="style">
          <img src="./images/banner4_1burger2_1x.jpg" class="pc" alt="humberger2">
          <img src="./images/banner4_3burger2_2x.jpg" class="sp" alt="humberger2">
          <h5 class="font">激旨バーガー</h5>
        </div>
      </div>


  </main>
